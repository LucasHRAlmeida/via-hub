<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIA Hub — Dr. Lucas HR</title>
<meta name="description" content="Vitrine do ecossistema VIA: ferramentas de educação médica e saúde pública de Dr. Lucas HR." />
<style>
:root{--bg:#0d1117;--card:#161b22;--txt:#e6edf3;--muted:#8b949e;--acc:#58a6ff;--line:#30363d}
html[data-theme="light"]{--bg:#fff;--card:#f6f8fa;--txt:#1f2328;--muted:#57606a;--acc:#0969da;--line:#d0d7de}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;line-height:1.5;padding:2rem 1rem;transition:.2s}
header{max-width:960px;margin:0 auto 2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
h1{font-size:1.6rem}
.sub{color:var(--muted);font-size:.9rem}
.controls{max-width:960px;margin:0 auto 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap}
.filter{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:20px;padding:.35rem .9rem;cursor:pointer;font-size:.85rem}
.filter[aria-pressed="true"]{border-color:var(--acc);color:var(--acc)}
.grid{max-width:960px;margin:0 auto;display:grid;gap:1rem;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1.2rem;display:flex;flex-direction:column;gap:.6rem}
.card h2{font-size:1.05rem}
.card p{color:var(--muted);font-size:.88rem;flex:1}
.badges{display:flex;gap:.4rem;flex-wrap:wrap}
.badge{font-size:.7rem;padding:.15rem .5rem;border-radius:6px;border:1px solid var(--line)}
.b-estavel{color:#3fb950;border-color:#238636}
.b-beta{color:#d29922;border-color:#9e6a03}
.b-prototipo{color:#8b949e}
.b-risk{color:#f85149;border-color:#da3633}
.links{display:flex;gap:.8rem;font-size:.85rem}
.links a{color:var(--acc);text-decoration:none}
.disc{font-size:.72rem;color:var(--muted);border-top:1px dashed var(--line);padding-top:.5rem}
#themeBtn{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:.4rem .7rem;cursor:pointer}
.err{max-width:960px;margin:0 auto;color:#f85149}
</style>
</head>
<body>
<header>
<div><h1>VIA Hub</h1><div class="sub" id="metaLine"></div></div>
<button id="themeBtn">☀ / ☾</button>
</header>
<div class="controls" id="filters"></div>
<main class="grid" id="grid"></main>
<p class="err" id="err" hidden></p>
<script>
const RISK_LABEL={nenhum:null,baixo:"risco baixo",moderado:"risco moderado",alto:"risco alto"};
async function boot(){
try{
const res=await fetch("projects.json",{cache:"no-store"});
if(!res.ok)throw new Error("HTTP "+res.status);
const data=await res.json();
render(data);
}catch(e){
const el=document.getElementById("err");
el.hidden=false;
el.textContent="Não foi possível carregar projects.json — "+e.message;
}
}
function badge(cls,text){return `<span class="badge ${cls}">${text}</span>`;}
function card(p){
const risk=RISK_LABEL[p.clinicalRisk];
return `<article class="card" data-cat="${p.category}">
<div class="badges">${badge("b-"+p.status,p.status)}${p.version?badge("","v"+p.version):""}${risk?badge("b-risk",risk):""}</div>
<h2>${p.name}</h2><p>${p.description}</p>
<div class="links"><a href="${p.url}" target="_blank" rel="noopener">Abrir ↗</a><a href="${p.repo}" target="_blank" rel="noopener">Código</a></div>
${p.disclaimer?`<div class="disc">${p.disclaimer}</div>`:""}</article>`;
}
function render(data){
document.getElementById("metaLine").textContent=`${data.meta.owner} · ${data.meta.affiliation} · atualizado ${data.meta.updated}`;
const grid=document.getElementById("grid");
grid.innerHTML=data.projects.map(card).join("");
const fb=document.getElementById("filters");
const cats=[{id:"all",label:"Todos"},...data.categories];
fb.innerHTML=cats.map((c,i)=>`<button class="filter" data-cat="${c.id}" aria-pressed="${i===0}">${c.label}</button>`).join("");
fb.addEventListener("click",e=>{
const btn=e.target.closest(".filter");if(!btn)return;
fb.querySelectorAll(".filter").forEach(b=>b.setAttribute("aria-pressed",b===btn));
const cat=btn.dataset.cat;
grid.querySelectorAll(".card").forEach(el=>{el.style.display=(cat==="all"||el.dataset.cat===cat)?"":"none";});
});
}
const root=document.documentElement;
document.getElementById("themeBtn").addEventListener("click",()=>{
const next=root.dataset.theme==="dark"?"light":"dark";
root.dataset.theme=next;localStorage.setItem("via-theme",next);
});
root.dataset.theme=localStorage.getItem("via-theme")||"dark";
boot();
</script>
</body>
</html>
